[build]
  command = "hugo --gc --minify -b $URL"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.81.0"
  HUGO_ENABLEGITINFO = "true"

[context.production.environment]
  HUGO_ENV = "production"

[context.deploy-preview]
  command = "hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"

[[plugins]]
  package = "netlify-plugin-hugo-cache-resources"
  [plugins.inputs]
    debug = true

# ============================================================
# URL redirects (short aliases for printed/QR-code distribution)
# ============================================================
# Defined here rather than in static/_redirects because Netlify reads
# netlify.toml reliably across Hugo builds.

[[redirects]]
  from = "/gatsby-appeal"
  to = "/uploads/gatsby-appeal-resources/Redacted_Appeal_Letters.pdf"
  status = 302
  force = true

[[redirects]]
  from = "/gatsby-appeal/"
  to = "/uploads/gatsby-appeal-resources/Redacted_Appeal_Letters.pdf"
  status = 302
  force = true
